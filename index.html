<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天機閣・奇門命論</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1208;--paper:#fdf6e8;--gold:#c8962a;--gold-lt:#f0d080;--gold-dk:#8a6010;
  --red:#8b2020;--purple:#3d2060;--border:#d4b86a;
  --panel:#fff9ee;--shadow:0 2px 16px rgba(100,60,0,0.10);
}
body{font-family:'Noto Sans TC',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh}
h1,h2,h3{font-family:'Noto Serif TC',serif}
.screen{display:none;padding:24px 16px;max-width:800px;margin:0 auto;animation:fadeIn .4s ease}
.screen.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── 密碼畫面 ── */
.lock-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;gap:20px}
.lock-title{font-family:'Noto Serif TC',serif;font-size:32px;color:var(--gold-dk);letter-spacing:8px}
.lock-sub{font-size:12px;color:#bbb;letter-spacing:3px}
.lock-circle{width:80px;height:80px;border:1.5px solid var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;color:var(--gold-dk);margin:8px 0}
.pin-dots{display:flex;gap:16px;margin:8px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--border);background:#fff;transition:all .2s}
.pin-dot.filled{background:var(--gold-dk);border-color:var(--gold-dk)}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:12px}
.pin-btn{width:72px;height:72px;border-radius:50%;border:1px solid var(--border);background:#fff;font-size:22px;font-family:'Noto Serif TC',serif;color:var(--ink);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
.pin-btn:hover{background:#fff8e0;border-color:var(--gold)}
.pin-btn:active{background:var(--gold-dk);color:#fff;border-color:var(--gold-dk)}
.pin-btn.del{font-size:16px;color:#aaa}
.pin-error{font-size:12px;color:var(--red);letter-spacing:2px;height:18px;text-align:center}

.app-header{text-align:center;padding:36px 0 24px;border-bottom:1px solid var(--border);margin-bottom:28px}
.app-header h1{font-size:28px;color:var(--gold-dk);letter-spacing:6px}
.app-header p{font-size:12px;color:#999;margin-top:6px;letter-spacing:2px}

.form-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:28px;box-shadow:var(--shadow);margin-bottom:16px}
.section-label{font-size:11px;color:var(--gold-dk);letter-spacing:2px;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #eee;font-weight:500}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;color:var(--gold-dk);font-weight:500;letter-spacing:1px}
.form-group input,.form-group select{padding:10px 13px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:14px;font-family:'Noto Sans TC',sans-serif;color:var(--ink);outline:none;transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--gold)}
.form-note{font-size:10px;color:#ccc;margin-top:3px}

/* 性別選擇 */
.gender-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.gender-btn{flex:1;padding:10px;border:none;background:#fff;font-size:14px;font-family:'Noto Serif TC',serif;color:#aaa;cursor:pointer;transition:all .2s;letter-spacing:2px}
.gender-btn.active{background:var(--gold-dk);color:#fff}

/* 功能勾選 */
.feature-section{margin-top:20px}
.feature-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}
.feature-item{border:1.5px solid var(--border);border-radius:10px;padding:14px 12px;cursor:pointer;transition:all .2s;background:#fff;position:relative;user-select:none}
.feature-item:hover{border-color:var(--gold);background:#fffdf5}
.feature-item.checked{border-color:var(--gold-dk);background:#fffae8}
.feature-item.locked{opacity:.7;cursor:default;border-color:#e0dcd4;background:#f8f5ef}
.feature-check{width:18px;height:18px;border:1.5px solid var(--border);border-radius:4px;display:flex;align-items:center;justify-content:center;margin-bottom:8px;font-size:12px;color:var(--gold-dk);background:#fff;transition:all .2s}
.feature-item.checked .feature-check{background:var(--gold-dk);border-color:var(--gold-dk);color:#fff}
.feature-item.locked .feature-check{background:#e0dcd4;border-color:#e0dcd4;color:#fff}
.feature-name{font-size:13px;font-weight:500;color:var(--ink);font-family:'Noto Serif TC',serif;letter-spacing:1px}
.feature-desc{font-size:11px;color:#aaa;margin-top:4px;line-height:1.5}
.feature-badge{position:absolute;top:8px;right:8px;font-size:9px;background:var(--gold-dk);color:#fff;padding:1px 6px;border-radius:10px;letter-spacing:1px}
.feature-badge.free{background:#888}

.btn-main{width:100%;padding:14px;background:linear-gradient(135deg,var(--gold-dk),var(--gold));color:#fff;border:none;border-radius:10px;font-size:15px;font-family:'Noto Serif TC',serif;letter-spacing:4px;cursor:pointer;margin-top:16px;transition:opacity .2s;box-shadow:0 4px 12px rgba(140,90,0,0.2)}
.btn-main:hover{opacity:.88}

.link-box{background:var(--panel);border:1.5px solid var(--gold);border-radius:12px;padding:20px 22px;box-shadow:var(--shadow)}
.link-box-title{font-size:12px;color:var(--gold-dk);letter-spacing:2px;margin-bottom:10px;font-weight:500}
.link-features{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.link-feature-tag{font-size:11px;background:var(--gold-dk);color:#fff;padding:2px 10px;border-radius:20px;letter-spacing:1px}
.link-url{font-size:11px;color:#555;background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 14px;word-break:break-all;line-height:1.7;margin-bottom:10px;font-family:monospace}
.link-expire{font-size:11px;color:#e08000;margin-bottom:14px;letter-spacing:1px}
.btn-copy{padding:9px 22px;background:var(--gold-dk);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-family:'Noto Serif TC',serif;letter-spacing:2px;transition:opacity .2s;margin-right:8px}
.btn-copy:hover{opacity:.85}
.btn-preview{padding:9px 22px;background:none;color:var(--gold-dk);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;font-family:'Noto Serif TC',serif;letter-spacing:2px;transition:background .2s}
.btn-preview:hover{background:#fff8e0}
.copy-ok{font-size:11px;color:green;margin-left:8px;display:none}

/* 命盤畫面 */
.person-banner{display:flex;align-items:center;gap:14px;margin-bottom:20px;padding:14px 18px;background:var(--panel);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
.person-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--gold-dk),var(--gold));display:flex;align-items:center;justify-content:center;font-size:19px;color:#fff;font-family:'Noto Serif TC',serif;flex-shrink:0}
.person-detail h3{font-size:16px;color:var(--ink)}
.person-detail p{font-size:11px;color:#aaa;margin-top:3px;letter-spacing:1px}
.expire-badge{font-size:10px;background:#fff3e0;color:#e08000;border:1px solid #f5c060;border-radius:20px;padding:2px 10px;margin-top:5px;display:inline-block}
.gender-badge{font-size:10px;padding:2px 10px;border-radius:20px;margin-top:5px;display:inline-block;margin-left:6px}
.gender-badge.male{background:#e6f1fb;color:#185fa5;border:1px solid #85b7eb}
.gender-badge.female{background:#fbeaf0;color:#993556;border:1px solid #ed93b1}

.tab-nav{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:22px;box-shadow:var(--shadow)}
.tab-btn{flex:1;padding:11px 4px;background:var(--panel);border:none;font-size:13px;font-family:'Noto Serif TC',serif;color:#999;cursor:pointer;transition:all .2s;letter-spacing:2px}
.tab-btn.active{background:var(--gold-dk);color:#fff}
.tab-btn:hover:not(.active){background:#fff8e0;color:var(--gold-dk)}
.tab-btn.locked-tab{opacity:.4;cursor:not-allowed}

.palace-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:4px;aspect-ratio:1;margin-bottom:20px}
.palace{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:7px 6px;cursor:pointer;transition:all .2s;display:flex;flex-direction:column;gap:2px}
.palace:hover{border-color:var(--gold);transform:scale(1.03);z-index:2;box-shadow:0 4px 10px rgba(140,90,0,0.12)}
.palace.selected{border-color:var(--gold);border-width:2px;background:#fff8e0}
.palace.mingong{background:linear-gradient(135deg,#fdf0d0,#fae8a0);border-color:var(--gold);border-width:1.5px}
.palace-name{font-size:10px;color:var(--gold-dk);font-weight:500;letter-spacing:1px;font-family:'Noto Serif TC',serif}
.palace-zhi{font-size:9px;color:#ccc}
.star-main{font-size:11px;color:var(--purple);font-weight:500;line-height:1.5;font-family:'Noto Serif TC',serif;margin-top:2px}
.star-aux{font-size:9px;color:#888;line-height:1.5}
.star-hua{font-size:9px;color:var(--red);font-weight:500}
.palace-center{grid-column:2/4;grid-row:2/4;background:var(--paper);border:1px solid var(--border);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:default;gap:4px;padding:10px}
.palace-center:hover{transform:none!important;box-shadow:none!important;border-color:var(--border)!important}
.center-title{font-family:'Noto Serif TC',serif;font-size:15px;color:var(--gold-dk);letter-spacing:4px}
.center-sub{font-size:10px;color:#bbb;letter-spacing:1px;text-align:center}
.center-sihua{font-size:10px;color:var(--gold-dk);text-align:center;line-height:1.8}
.center-hint{font-size:10px;color:var(--gold);margin-top:4px}

.analysis-panel{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow)}
.analysis-header{padding:13px 18px;background:linear-gradient(135deg,var(--gold-dk),#a07820);color:#fff;display:flex;align-items:center;gap:10px}
.analysis-header h3{font-family:'Noto Serif TC',serif;font-size:14px;letter-spacing:2px}
.analysis-body{padding:18px;min-height:120px;font-size:14px;line-height:2;color:var(--ink)}
.analysis-body p{margin-bottom:10px}
.analysis-body strong{color:var(--purple);font-weight:500}
.placeholder-text{color:#ccc;font-size:13px;text-align:center;padding:28px 0;letter-spacing:1px}
.loading-dots{display:flex;align-items:center;gap:10px;color:#bbb;font-size:13px;padding:16px 0}
.dot-anim span{animation:blink 1.2s infinite;font-size:16px;color:var(--gold)}
.dot-anim span:nth-child(2){animation-delay:.2s}
.dot-anim span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
.locked-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;color:#ccc;text-align:center;gap:10px}
.locked-panel .lock-icon{font-size:32px;opacity:.4}
.locked-panel p{font-size:13px;letter-spacing:1px}

.match-badge{display:inline-block;background:linear-gradient(135deg,var(--gold-dk),var(--gold));color:#fff;font-size:11px;padding:3px 12px;border-radius:20px;margin-bottom:14px;font-family:'Noto Serif TC',serif;letter-spacing:2px}
.expired-box{text-align:center;padding:60px 20px}
.expired-icon{font-size:48px;margin-bottom:20px}
.expired-box h2{font-size:22px;color:var(--gold-dk);margin-bottom:12px;letter-spacing:3px}
.expired-box p{font-size:14px;color:#999;line-height:1.8}
.app-footer{text-align:center;padding:20px 0;font-size:11px;color:#ccc;letter-spacing:1px;margin-top:20px}

@media(max-width:520px){
  .app-header h1{font-size:22px}
  .form-row{grid-template-columns:1fr}
  .form-row-3{grid-template-columns:1fr 1fr}
  .feature-grid{grid-template-columns:1fr}
  .palace-name{font-size:9px}.star-main{font-size:10px}.star-aux,.star-hua{font-size:8px}
  .center-title{font-size:12px}
  .tab-btn{font-size:11px;padding:10px 2px}
  .btn-copy,.btn-preview{width:100%;margin-bottom:8px;margin-right:0}
  .pin-pad{grid-template-columns:repeat(3,64px);gap:10px}
  .pin-btn{width:64px;height:64px;font-size:20px}
}
</style>
</head>
<body>

<!-- ① 密碼畫面 -->
<div class="screen active" id="screen-lock">
  <div class="lock-screen">
    <div class="lock-title">天機閣</div>
    <div class="lock-sub">奇門命論・管理者入口</div>
    <div class="lock-circle">🔐</div>
    <div class="pin-dots">
      <div class="pin-dot" id="dot-0"></div>
      <div class="pin-dot" id="dot-1"></div>
      <div class="pin-dot" id="dot-2"></div>
      <div class="pin-dot" id="dot-3"></div>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-pad">
      <button class="pin-btn" onclick="pinInput('1')">1</button>
      <button class="pin-btn" onclick="pinInput('2')">2</button>
      <button class="pin-btn" onclick="pinInput('3')">3</button>
      <button class="pin-btn" onclick="pinInput('4')">4</button>
      <button class="pin-btn" onclick="pinInput('5')">5</button>
      <button class="pin-btn" onclick="pinInput('6')">6</button>
      <button class="pin-btn" onclick="pinInput('7')">7</button>
      <button class="pin-btn" onclick="pinInput('8')">8</button>
      <button class="pin-btn" onclick="pinInput('9')">9</button>
      <button class="pin-btn del" onclick="pinDelete()">⌫</button>
      <button class="pin-btn" onclick="pinInput('0')">0</button>
      <button class="pin-btn del" onclick="pinClear()">✕</button>
    </div>
  </div>
</div>

<!-- ② 輸入畫面 -->
<div class="screen" id="screen-input">
  <div class="app-header">
    <h1>天機閣</h1>
    <p>奇門命論・紫微斗數命盤解析</p>
  </div>
  <div class="form-card">
    <div class="section-label">命主資料</div>
    <div class="form-group" style="margin-bottom:14px">
      <label>姓名（可暱稱）</label>
      <input type="text" id="inp-name" placeholder="例：小明" maxlength="10">
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label>性別</label>
      <div class="gender-toggle">
        <button class="gender-btn active" id="gbtn-male" onclick="setGender('male')">男命</button>
        <button class="gender-btn" id="gbtn-female" onclick="setGender('female')">女命</button>
      </div>
    </div>
    <input type="hidden" id="inp-gender" value="male">
    <div class="section-label" style="margin-top:6px">出生資訊</div>
    <div class="form-row-3">
      <div class="form-group">
        <label>出生年（西元）</label>
        <input type="number" id="inp-year" placeholder="例：1990" min="1920" max="2010">
      </div>
      <div class="form-group">
        <label>出生月</label>
        <select id="inp-month">
          <option value="">請選擇</option>
          <option value="1">1月</option><option value="2">2月</option>
          <option value="3">3月</option><option value="4">4月</option>
          <option value="5">5月</option><option value="6">6月</option>
          <option value="7">7月</option><option value="8">8月</option>
          <option value="9">9月</option><option value="10">10月</option>
          <option value="11">11月</option><option value="12">12月</option>
        </select>
      </div>
      <div class="form-group">
        <label>出生日</label>
        <input type="number" id="inp-day" placeholder="例：15" min="1" max="31">
      </div>
    </div>
    <div class="form-group">
      <label>出生時辰</label>
      <select id="inp-hour">
        <option value="">請選擇時辰</option>
        <option value="時辰不詳">時辰不詳（AI 推論命宮）</option>
        <option value="子時">子時（23:00–01:00）</option>
        <option value="丑時">丑時（01:00–03:00）</option>
        <option value="寅時">寅時（03:00–05:00）</option>
        <option value="卯時">卯時（05:00–07:00）</option>
        <option value="辰時">辰時（07:00–09:00）</option>
        <option value="巳時">巳時（09:00–11:00）</option>
        <option value="午時">午時（11:00–13:00）</option>
        <option value="未時">未時（13:00–15:00）</option>
        <option value="申時">申時（15:00–17:00）</option>
        <option value="酉時">酉時（17:00–19:00）</option>
        <option value="戌時">戌時（19:00–21:00）</option>
        <option value="亥時">亥時（21:00–23:00）</option>
      </select>
      <div class="form-note">不知道時辰可選「時辰不詳」</div>
    </div>
    <div class="feature-section">
      <div class="section-label">選擇開放功能</div>
      <div class="feature-grid">
        <div class="feature-item locked" id="feat-chart">
          <div class="feature-check">✓</div>
          <div class="feature-name">命盤解析</div>
          <div class="feature-desc">十二宮位・點擊即解析</div>
          <div class="feature-badge free">基本</div>
        </div>
        <div class="feature-item" id="feat-liunian" onclick="toggleFeature('liunian')">
          <div class="feature-check" id="check-liunian"></div>
          <div class="feature-name">流年運勢</div>
          <div class="feature-desc">今年運勢完整分析</div>
          <div class="feature-badge">加選</div>
        </div>
        <div class="feature-item" id="feat-person" onclick="toggleFeature('person')">
          <div class="feature-check" id="check-person"></div>
          <div class="feature-name">相似人物</div>
          <div class="feature-desc">歷史人物命盤比對</div>
          <div class="feature-badge">加選</div>
        </div>
      </div>
    </div>
    <button class="btn-main" id="btn-generate">✦ 產生專屬連結</button>
  </div>
  <div class="link-box" id="link-box" style="display:none">
    <div class="link-box-title">✦ 專屬命盤連結</div>
    <div class="link-features" id="link-features"></div>
    <div class="link-url" id="link-url">—</div>
    <div class="link-expire" id="link-expire">—</div>
    <button class="btn-copy" id="btn-copy">複製連結</button>
    <button class="btn-preview" id="btn-preview">預覽命盤</button>
    <span class="copy-ok" id="copy-ok">✓ 已複製</span>
  </div>
  <div class="app-footer">天機閣・奇門命論</div>
</div>

<!-- ③ 命盤畫面 -->
<div class="screen" id="screen-chart">
  <div class="person-banner">
    <div class="person-avatar" id="pi-avatar">命</div>
    <div class="person-detail">
      <h3 id="pi-name">—</h3>
      <p id="pi-info">—</p>
      <span class="expire-badge" id="pi-expire">—</span>
      <span class="gender-badge" id="pi-gender-badge">—</span>
    </div>
  </div>
  <div class="tab-nav">
    <button class="tab-btn active" data-tab="chart">命　盤</button>
    <button class="tab-btn" data-tab="liunian" id="tab-btn-liunian">流　年</button>
    <button class="tab-btn" data-tab="person" id="tab-btn-person">相似人物</button>
  </div>
  <div id="tab-chart">
    <div class="palace-grid" id="palace-grid"></div>
    <div class="analysis-panel">
      <div class="analysis-header"><span>✦</span><h3 id="analysis-title">宮位解析</h3></div>
      <div class="analysis-body" id="analysis-body">
        <div class="placeholder-text">點擊上方任一宮位<br>即時解析星曜意涵</div>
      </div>
    </div>
  </div>
  <div id="tab-liunian" style="display:none">
    <div id="liunian-content">
      <div class="analysis-panel">
        <div class="analysis-header"><span>☽</span><h3 id="ly-title">流年運勢</h3></div>
        <div class="analysis-body" id="ly-body">
          <div class="loading-dots">
            <div class="dot-anim"><span>●</span><span>●</span><span>●</span></div>
            <span style="color:#bbb;font-size:13px">載入中…</span>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="tab-person" style="display:none">
    <div id="person-content">
      <div class="analysis-panel">
        <div class="analysis-header"><span>☆</span><h3>命盤相似歷史人物</h3></div>
        <div class="analysis-body" id="person-body">
          <div class="loading-dots">
            <div class="dot-anim"><span>●</span><span>●</span><span>●</span></div>
